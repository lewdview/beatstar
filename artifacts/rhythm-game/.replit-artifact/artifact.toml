kind = "web"
previewPath = "/"
title = "TH3SCR1B3 Rhythm Game"
version = "1.0.0"
id = "artifacts/rhythm-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23045

[services.development]
run = "pnpm --filter @workspace/rhythm-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rhythm-game", "run", "build" ]
publicDir = "artifacts/rhythm-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23045"
BASE_PATH = "/"
